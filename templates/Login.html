{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Analisis Mobil</title>
<link rel="icon" href="{% static 'images/ml.jpg' %}" type="image/png">
    <!-- Menggunakan Google Fonts untuk tampilan yang lebih modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/index.css' %}">

</head>
<body>

    <div class="login-container">
        
        <!-- Panel Kiri untuk Branding -->
        <div class="left-panel">
            <div>
                <h1>Prediksi Harga Mobil</h1>
                <p>Gunakan kekuatan data untuk membuat keputusan cerdas dalam jual beli kendaraan Anda.</p>
            </div>
        </div>

        <!-- Panel Kanan untuk Form Login -->
        <div class="right-panel">
            <div class="login-form">
                <h2>Selamat Datang</h2>
                <p>Masuk dengan akun Google Anda untuk memulai.</p>
                
                <!-- Tombol ini mengarah ke URL login Django Anda -->
                <a href="{% url 'google_login' %}" class="google-login-btn">
                    <!-- SVG Logo Google -->
                    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" xmlns:xlink="http://www.w3.org/1999/xlink" style="display: block;">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                        <path fill="none" d="M0 0h48v48H0z"></path>
                    </svg>
                    <span>Masuk dengan Google</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
