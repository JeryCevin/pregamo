 {% load static %}
 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PreGaMo{% endblock title %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    {% block styles %}{% endblock styles %}
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="container">
            <a href="#dashboard-section" class="logo">PreGaMo</a>
            <div class="nav-icons">
              <div class="user-profile-group">
        
        <i class="fas fa-user user-icon"></i>
        
        <span class="user-display-name">
            {% if user.first_name %}
                {{ user.first_name }}
            {% else %}
                {{ user.email }}
            {% endif %}
        </span>

        <div class="nav-action-links">
            <a href="#dashboard-section" class="nav-link active">Home</a>
            <a href="{% url 'logout' %}" class="nav-link logout-link">Logout</a>
        </div>
    </div>
            </div>
        </div>
    </header>

    {% block content %}
    {% endblock content %}

    <script>
        const logoutHref = "{% url 'logout' %}";
        const defaultHash = "{% if request.path == '/api/predict/' %}#predict-section{% else %}#dashboard-section{% endif %}";

        // Navbar scroll effect
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Active nav link highlighting untuk one-page navigation
        const navLinks = Array.from(document.querySelectorAll('.nav-action-links .nav-link'));

        function setActiveLink(targetHash) {
            navLinks.forEach(link => {
                const linkHash = link.getAttribute('href');
                if (linkHash === targetHash) {
                    link.classList.add('active');
                } else if (linkHash !== logoutHref) {
                    link.classList.remove('active');
                }
            });
        }

        function updateActiveFromHash() {
            const targetHash = window.location.hash || defaultHash;
            setActiveLink(targetHash);
            if (!window.location.hash && defaultHash === '#predict-section') {
                const target = document.querySelector(defaultHash);
                if (target) {
                    target.scrollIntoView();
                }
            }
        }

        window.addEventListener('hashchange', updateActiveFromHash);
        updateActiveFromHash();
    </script>
    
    {% block scripts %}{% endblock scripts %}
</body>

</html>
